<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personalized_webPage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="script.js"></script>
  </head>
  <body>
    <div
      id="container"
      class="bg-[#605B51] w-full min-h-screen flex flex-col justify-center items-center gap-12 text-3xl"
    >
      <section class="bg-[#454040] card shadow-2xl my-6 mx-4 p-4 rounded-xl">
        <h1 class="text-[#E6F082] font-bold font-sarif">
          Personalized Web Page
        </h1>
        <form action="#" method="post" class="flex flex-col text-left my-4">
          <label for="name" class="text-white">Full Name</label>
          <input
            type="text"
            id="name"
            placeholder="Enter Your Full Name"
            class="font-semibold rounded-lg px-2 my-4 border-2 border-gray-300 rounded focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />
          <label for="dob" class="text-white font-semibold"
            >Date of Birth</label
          >
          <input
            type="date"
            id="DoB"
          
            class="rounded-lg px-2 my-4 h-fit py-1 border-2 border-gray-300 rounded focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
          />

          <button
           onclick="saveUseData()" class="bg-[#E6F082] font-semibold block mx-auto w-[50%]  hover:scale-105 hover:bg-[#E6F000] text-black font-semibold py-2 px-6 mt-4 rounded-lg transition-all duration-200 cursor-pointer"
          >
            Submit
          </button>

          <!--   hover:shadow-lg 
                 hover:scale-105
                 transition-all 
                 duration-300
                 cursor-pointer -->
        </form>
      </section>
    </div>
  </body>
</html>
